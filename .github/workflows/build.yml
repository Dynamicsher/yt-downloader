name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-buildozer .

      - name: Build APK
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -w /home/user/hostcwd \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            my-buildozer \
            buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
