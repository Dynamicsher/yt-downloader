name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
      ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b
      ANDROIDAPI: "33"
      ANDROIDMINAPI: "21"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: sudo apt-get install -y git zip unzip autoconf libtool pkg-config

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform
          yes | buildozer android debug 2>&1 | head -5 || true
          find ~/.buildozer -name "sdkmanager" 2>/dev/null | head -3

      - name: Build APK
        run: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
